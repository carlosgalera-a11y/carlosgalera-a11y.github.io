<body class="bg-[#0b1326] text-[#F8FAFC] font-body selection:bg-indigo-500/30">
  <!-- Offline indicator -->
  <div id="offline-banner">⚡ Sin conexión — FileHub funciona offline con tus datos guardados</div>

  <div id="root"></div>

  <script>
    // Catch Supabase auth errors globally to prevent white screen
    window.addEventListener('error', function(e) {
      if (e.message && (e.message.includes("reading 'user'") || e.message.includes("reading 'session'") || e.message.includes("reading 'email'") || e.message.includes("reading 'id'"))) {
        e.preventDefault();
        console.warn('⚠️ Auth session not ready yet — suppressed error');
      }
    });
    window.addEventListener('unhandledrejection', function(e) {
      if (e.reason?.message && (e.reason.message.includes('user') || e.reason.message.includes('session') || e.reason.message.includes('ENOTFOUND') || e.reason.message.includes('Failed to fetch'))) {
        e.preventDefault();
      }
    });
  </script>

  <script>
    // Offline detection
    function updateOnlineStatus() {
      const banner = document.getElementById('offline-banner');
      if (!navigator.onLine) banner.classList.add('show');
      else banner.classList.remove('show');
    }
    window.addEventListener('online', updateOnlineStatus);
    window.addEventListener('offline', updateOnlineStatus);
    updateOnlineStatus();

    // Service Worker — Force update for iOS PWA
    const SW_EXPECTED_VERSION = 'filehub-v108';
    if ('serviceWorker' in navigator) {
      // Nuke old SWs on iOS standalone
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
      const lastSWVersion = localStorage.getItem('filehub_sw_version');
      
      if (lastSWVersion && lastSWVersion !== SW_EXPECTED_VERSION) {
        console.log('[SW] Old version detected, nuking caches...');
        caches.keys().then(keys => Promise.all(keys.map(k => caches.delete(k)))).then(() => {
          navigator.serviceWorker.getRegistrations().then(regs => {
            regs.forEach(r => r.unregister());
            localStorage.setItem('filehub_sw_version', SW_EXPECTED_VERSION);
            if (isStandalone) window.location.reload();
          });
        });
      } else {
        localStorage.setItem('filehub_sw_version', SW_EXPECTED_VERSION);
      }

      window.addEventListener('load', async () => {
        // Detecta dinámicamente la base path del deploy. Funciona en:
        //   /                  (arditifilehub.com)
        //   /filehub2026/      (mirror)
        //   /filehub2026-pages/ (mirror alternativo)
        const path = location.pathname;
        const swBase = path.endsWith('/') ? path : path.substring(0, path.lastIndexOf('/') + 1);
        try {
          const reg = await navigator.serviceWorker.register(swBase + 'sw.js', { scope: swBase });
          console.log('[SW] Registered:', reg.scope);
          // Force check for updates on every load in standalone mode
          if (isStandalone) reg.update();

          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (newWorker) {
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  newWorker.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            }
          });

          // Listen for SW_UPDATED message → reload to get fresh content
          navigator.serviceWorker.addEventListener('message', event => {
            if (event.data?.type === 'SW_UPDATED') {
              console.log('[App] New SW active, reloading...');
              window.location.reload();
            }
          });

          // Also reload when controller changes (SW took over)
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (!refreshing) {
              refreshing = true;
              window.location.reload();
            }
          });

        } catch (err) {
          console.warn('[SW] Registration failed:', err);
        }
      });
    }
  </script>
